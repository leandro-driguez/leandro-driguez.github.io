title: "Leandro Rodriguez"
description: "A personal site & blog, written in Notion."
url: "https://username.github.io" # e.g. https://username.github.io
baseurl: "" # e.g. /repo-name (leave empty if using username.github.io)

author:
  name: "Leandro Rodriguez"
  email: "you@example.com"

# ── Build settings ────────────────────────────────────────────────────────────
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:slug/
timezone: UTC

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"

# ── Collections ───────────────────────────────────────────────────────────────
collections:
  pages:
    output: true
    permalink: /:slug/

defaults:
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: "page"

# ── Plugins (all supported by GitHub Pages) ───────────────────────────────────
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# ── Feed ──────────────────────────────────────────────────────────────────────
feed:
  posts_limit: 20

# ── SEO defaults ──────────────────────────────────────────────────────────────
twitter:
  username: "" # optional

# ── Exclude from build ────────────────────────────────────────────────────────
exclude:
  - scripts/
  - node_modules/
  - package.json
  - package-lock.json
  - "*.sh"
  - Gemfile
  - Gemfile.lock
  - .env
  - .env.*
  - vendor/
  - leandrodriguez.me/
  - prompt.txt
